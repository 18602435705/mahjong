<svg width="100%" height="100%" viewBox="0 0 150 120">
    <defs>
        <mask id="hole">
            <!-- 白色 = 显示 -->
            <rect width="100%" height="100%" fill="white" />
            <!-- 黑色 = 镂空 -->
            <polygon points="75,20 83,50 115,50 90,70 100,100 75,80 50,100 60,70 35,50 67,50" fill="black" />
        </mask>
    </defs>
    <rect width="100%" height="100%" fill="red" mask="url(#hole)" />
</svg>